name: Update Stats SVG

on:
  schedule:
    - cron: '0 0 * * *'   # 毎日 00:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate combined stats SVG
        run: python scripts/generate-stats-svg.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/profile/stats-layout.svg
          git diff --staged --quiet || git commit -m "chore: update stats layout svg"
          git push
