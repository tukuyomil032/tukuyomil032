name: Update Stats SVG

on:
  schedule:
    - cron: '0 */3 * * *'  # 3時間おき
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate combined stats SVG
        run: python scripts/generate-stats-svg.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/profile/stats-layout-v2.svg
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          else
            git commit -m "chore: update stats layout svg" -m "Co-Authored-By: tukuyomil032 <118542180+tukuyomil032@users.noreply.github.com>"
            git push
          fi
