<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1046 190" width="100%">
  <svg id="stats-card"
       x="0" y="0" width="576" height="190"
       viewBox="0 0 576 190" xmlns="http://www.w3.org/2000/svg">
    
    <style>
    .text { font: 600 16px 'Segoe UI', Ubuntu, Sans-Serif; fill: #bddfff }
    .small { font: 600 12px 'Segoe UI', Ubuntu, Sans-Serif; fill: #6e93b5 }
    .gray { fill: #858585 }
    </style>
    <rect x="0.5" y="0.5" width="575.5" height="99%" rx="4.5" fill="#172f45" stroke="#e4e2e2"/>
    <text x="25" y="45" class="text">Something went wrong! file an issue at https://tiny.one/readme-stats</text>
    <text data-testid="message" x="25" y="55" class="text small">
      <tspan x="25" dy="18">Cannot read properties of undefined (reading 'user')</tspan>
      <tspan x="25" dy="18" class="gray"></tspan>
    </text>
    
  </svg>
  <svg id="langs-card"
       x="586" y="0" width="460" height="190"
       viewBox="0 0 460 190" xmlns="http://www.w3.org/2000/svg">
    
        <title id="titleId"></title>
        <desc id="descId"></desc>
        <style>
          .header {
            font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif;
            fill: #bddfff;
            animation: fadeInAnimation 0.8s ease-in-out forwards;
          }
          @supports(-moz-appearance: auto) {
            /* Selector detects Firefox */
            .header { font-size: 15.5px; }
          }
          
    @keyframes slideInAnimation {
      from {
        width: 0;
      }
      to {
        width: calc(100%-100px);
      }
    }
    @keyframes growWidthAnimation {
      from {
        width: 0;
      }
      to {
        width: 100%;
      }
    }
    .stat {
      font: 600 14px 'Segoe UI', Ubuntu, "Helvetica Neue", Sans-Serif; fill: #6e93b5;
    }
    @supports(-moz-appearance: auto) {
      /* Selector detects Firefox */
      .stat { font-size:12px; }
    }
    .bold { font-weight: 700 }
    .lang-name {
      font: 400 11px "Segoe UI", Ubuntu, Sans-Serif;
      fill: #6e93b5;
    }
    .stagger {
      opacity: 0;
      animation: fadeInAnimation 0.3s ease-in-out forwards;
    }
    #rect-mask rect{
      animation: slideInAnimation 1s ease-in-out forwards;
    }
    .lang-progress{
      animation: growWidthAnimation 0.6s ease-in-out forwards;
    }
    

          
      /* Animations */
      @keyframes scaleInAnimation {
        from {
          transform: translate(-5px, 5px) scale(0);
        }
        to {
          transform: translate(-5px, 5px) scale(1);
        }
      }
      @keyframes fadeInAnimation {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    
          
        </style>

        

        <rect
          data-testid="card-bg"
          x="0.5"
          y="0.5"
          rx="4.5"
          height="99%"
          stroke="#e4e2e2"
          width="459"
          fill="#172f45"
          stroke-opacity="1"
        />

        
      <g
        data-testid="card-title"
        transform="translate(25, 35)"
      >
        <g transform="translate(0, 0)">
      <text
        x="0"
        y="0"
        class="header"
        data-testid="header"
      >Most Used Languages</text>
    </g>
      </g>
    

        <g
          data-testid="main-card-body"
          transform="translate(0, 55)"
        >
          
    <svg data-testid="lang-items" x="25">
      
  
      <mask id="rect-mask">
          <rect x="0" y="0" width="410" height="8" fill="white" rx="5"/>
        </mask>
        
        <rect
          mask="url(#rect-mask)"
          data-testid="lang-progress"
          x="0"
          y="0"
          width="305.18"
          height="8"
          fill="#3178c6"
        />
      
        <rect
          mask="url(#rect-mask)"
          data-testid="lang-progress"
          x="305.18"
          y="0"
          width="31.59"
          height="8"
          fill="#dea584"
        />
      
        <rect
          mask="url(#rect-mask)"
          data-testid="lang-progress"
          x="336.77"
          y="0"
          width="28.25"
          height="8"
          fill="#b07219"
        />
      
        <rect
          mask="url(#rect-mask)"
          data-testid="lang-progress"
          x="365.02"
          y="0"
          width="15.32"
          height="8"
          fill="#F05138"
        />
      
        <rect
          mask="url(#rect-mask)"
          data-testid="lang-progress"
          x="380.34"
          y="0"
          width="13.01"
          height="8"
          fill="#3572A5"
        />
      
        <rect
          mask="url(#rect-mask)"
          data-testid="lang-progress"
          x="393.34999999999997"
          y="0"
          width="17.63"
          height="8"
          fill="#89e051"
        />
      
        <rect
          mask="url(#rect-mask)"
          data-testid="lang-progress"
          x="400.97999999999996"
          y="0"
          width="16.08"
          height="8"
          fill="#e34c26"
        />
      
        <rect
          mask="url(#rect-mask)"
          data-testid="lang-progress"
          x="407.05999999999995"
          y="0"
          width="12.92"
          height="8"
          fill="#000080"
        />
      
      
    <g transform="translate(0, 25)">
      <g transform="translate(0, 0)"><g transform="translate(0, 0)">
    <g class="stagger" style="animation-delay: 450ms">
      <circle cx="5" cy="6" r="5" fill="#3178c6" />
      <text data-testid="lang-name" x="15" y="10" class='lang-name'>
        TypeScript 74.43%
      </text>
    </g>
  </g><g transform="translate(0, 25)">
    <g class="stagger" style="animation-delay: 600ms">
      <circle cx="5" cy="6" r="5" fill="#dea584" />
      <text data-testid="lang-name" x="15" y="10" class='lang-name'>
        Rust 7.71%
      </text>
    </g>
  </g><g transform="translate(0, 50)">
    <g class="stagger" style="animation-delay: 750ms">
      <circle cx="5" cy="6" r="5" fill="#b07219" />
      <text data-testid="lang-name" x="15" y="10" class='lang-name'>
        Java 6.89%
      </text>
    </g>
  </g><g transform="translate(0, 75)">
    <g class="stagger" style="animation-delay: 900ms">
      <circle cx="5" cy="6" r="5" fill="#F05138" />
      <text data-testid="lang-name" x="15" y="10" class='lang-name'>
        Swift 3.74%
      </text>
    </g>
  </g></g><g transform="translate(150, 0)"><g transform="translate(0, 0)">
    <g class="stagger" style="animation-delay: 450ms">
      <circle cx="5" cy="6" r="5" fill="#3572A5" />
      <text data-testid="lang-name" x="15" y="10" class='lang-name'>
        Python 3.17%
      </text>
    </g>
  </g><g transform="translate(0, 25)">
    <g class="stagger" style="animation-delay: 600ms">
      <circle cx="5" cy="6" r="5" fill="#89e051" />
      <text data-testid="lang-name" x="15" y="10" class='lang-name'>
        Shell 1.86%
      </text>
    </g>
  </g><g transform="translate(0, 50)">
    <g class="stagger" style="animation-delay: 750ms">
      <circle cx="5" cy="6" r="5" fill="#e34c26" />
      <text data-testid="lang-name" x="15" y="10" class='lang-name'>
        HTML 1.48%
      </text>
    </g>
  </g><g transform="translate(0, 75)">
    <g class="stagger" style="animation-delay: 900ms">
      <circle cx="5" cy="6" r="5" fill="#000080" />
      <text data-testid="lang-name" x="15" y="10" class='lang-name'>
        Lua 0.71%
      </text>
    </g>
  </g></g>
    </g>
  
    </svg>
  
        </g>
      
  </svg>
</svg>
